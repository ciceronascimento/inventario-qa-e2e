name: Cypress E2E

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      tipo_teste:
        description: Tipo de teste a executar
        required: true
        default: regression
        type: choice
        options:
          - all
          - regression
          - extended

jobs:
  quality:
    name: Validar qualidade
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Validate TypeScript
        run: npx tsc --noEmit

      - name: Check formatting
        run: npm run format:check

  e2e:
    name: Executar Cypress E2E
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    needs: quality

    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      USER_EMAIL: ${{ secrets.USER_EMAIL }}
      USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
      TIPO_TESTE: ${{ github.event.inputs.tipo_teste || 'regression' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Debug env
        run: |
          echo "BASE_URL definida: ${{ env.BASE_URL != '' }}"
          curl -I $BASE_URL || echo "Falha ao conectar em BASE_URL"

      - name: Run all tests
        if: ${{ github.event.inputs.tipo_teste == 'all' }}
        run: npm run cy:run

      - name: Run regression tests
        if: ${{ github.event.inputs.tipo_teste == 'regression' }}
        run: npm run cy:run:regression

      - name: Run extended tests
        if: ${{ github.event.inputs.tipo_teste == 'extended' }}
        run: npm run cy:run:extended

      - name: Upload Cypress screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore

      - name: Upload Cypress videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          path: cypress/videos
          if-no-files-found: ignore

      - name: Upload Cypress reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-reports
          path: cypress/reports
          if-no-files-found: ignore
